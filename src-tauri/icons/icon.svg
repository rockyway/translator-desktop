<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gold gradient matching the app theme -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle inner shadow -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="4" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
    <!-- Drop shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#92400E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect
    x="32" y="32"
    width="448" height="448"
    rx="96" ry="96"
    fill="url(#goldGradient)"
    filter="url(#dropShadow)"
  />

  <!-- Subtle highlight on top-left -->
  <rect
    x="32" y="32"
    width="448" height="448"
    rx="96" ry="96"
    fill="url(#goldGradient)"
  />

  <!-- Translation icon - scaled and centered -->
  <g transform="translate(96, 96) scale(13.33)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left side - source language symbol (stylized text lines) -->
    <path d="M5 8l6 6" />
    <path d="M4 14l6-6 2-3" />
    <path d="M2 5h12" />
    <path d="M7 2h1" />

    <!-- Right side - "A" representing translated text -->
    <path d="M22 22l-5-10-5 10" />
    <path d="M14 18h6" />
  </g>
</svg>
